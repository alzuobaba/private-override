name: '&#x1F4A0; RevenueCat &amp; iTunes 解锁'
desc: |-
  RevenueCat 内购验证 + iTunes verifyReceipt 双解锁覆写
  - 不依赖外部 Worker，完全自包含
  - 拦截 Apple / RevenueCat 订阅验证请求并注入永久凭证
author: alzuobaba
homepage: https://github.com/alzuobaba/private-override
category: '&#x1F513; 解锁 / 激活'
date: '2026-05-27'
version: '1.0.0'

http:
  mitm:
    - api.revenuecat.com
    - api.rc-backup.com
    - buy.itunes.apple.com
  script:
    - match: ^https:\/\/buy\.itunes\.apple\.com\/verifyReceipt
      name: itunes-verify
      type: response
      require-body: true
      timeout: 5
    - match: ^https:\/\/api\.(revenuecat|rc-backup)\.com\/v[12]\/(receipts|subscribers\/[^/?]+)(\/.*)?$
      name: revenuecat
      type: response
      require-body: true
      timeout: 5

script-providers:
  itunes-verify:
    url: https://raw.githubusercontent.com/alzuobaba/private-override/main/scripts/itunes.js
    interval: 86400
  revenuecat:
    url: https://raw.githubusercontent.com/alzuobaba/private-override/main/scripts/revenuecat.js
    interval: 86400
